application:
  environment: !env APP_ENV, dev
  debug: !env APP_DEBUG, true

localization:
  locale: "en"
  supported_locales:
    - "en"
  locale_path: "locale"
  timezone: "UTC"

render:
  engine: "latte"
  directory: "app/Views"
  cache: "cache/latte"
  mode: "always"

leaf:
  name: "My Project"
  version: "1.0.0"
  description: "A documentation site powered by Zephyrus Leaf."
  github_url: ""
  content_path: "content"
  sections:
    getting-started: "Getting Started"
  output_path: "dist"
  base_url: ""
  author: ""
  author_url: ""
  license: "MIT"
